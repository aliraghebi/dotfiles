# ============================================================================
# VISUAL ENHANCEMENTS
# ============================================================================
# Additional visual settings to make kitty more colorful and aesthetically pleasing

# ───────────────────────────────────────────────────────────────────────────
# Window Padding and Layout
# ───────────────────────────────────────────────────────────────────────────
# Add padding inside the window for a more spacious feel
# Format: top right bottom left (like CSS)
window_padding_width 4

# Enable splits layout so vsplit/hsplit directions work correctly
enabled_layouts splits

# Margin between windows when using splits
window_margin_width 2

# Border around windows (when using splits/layouts)
window_border_width 1pt

# Draw only the border that separates windows in a layout
draw_minimal_borders yes

# Remove title bar (useful with tiling window managers)
hide_window_decorations no

# ───────────────────────────────────────────────────────────────────────────
# Window Border Colors — Catppuccin Mocha
# ───────────────────────────────────────────────────────────────────────────
active_border_color   #89b4fa
inactive_border_color #45475a
bell_border_color     #89dceb

# ───────────────────────────────────────────────────────────────────────────
# Cursor — Catppuccin Mocha
# ───────────────────────────────────────────────────────────────────────────
cursor            #b4befe
cursor_text_color #1e1e2e
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# ───────────────────────────────────────────────────────────────────────────
# URL Styling — Catppuccin Mocha
# ───────────────────────────────────────────────────────────────────────────
url_color #74c7ec
url_style curly

# ───────────────────────────────────────────────────────────────────────────
# Selection Colors — Catppuccin Mocha
# ───────────────────────────────────────────────────────────────────────────
selection_background #b4befe
selection_foreground #1e1e2e

# ───────────────────────────────────────────────────────────────────────────
# Mark Colors — Catppuccin Mocha
# ───────────────────────────────────────────────────────────────────────────
mark1_foreground #1e1e2e
mark1_background #89dceb

mark2_foreground #1e1e2e
mark2_background #89b4fa

mark3_foreground #1e1e2e
mark3_background #74c7ec
