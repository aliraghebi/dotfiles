# ============================================================================
# KEYBOARD SHORTCUTS
# ============================================================================
# Define the modifier key for most kitty shortcuts
# Options: ctrl, shift, alt, super (cmd on macOS)
kitty_mod super

# ───────────────────────────────────────────────────────────────────────────
# Tab Management
# ───────────────────────────────────────────────────────────────────────────
map kitty_mod+t      new_tab_with_cwd
map kitty_mod+shift+]  next_tab
map kitty_mod+shift+[  previous_tab

map kitty_mod+1 goto_tab 1
map kitty_mod+2 goto_tab 2
map kitty_mod+3 goto_tab 3
map kitty_mod+4 goto_tab 4
map kitty_mod+5 goto_tab 5
map kitty_mod+6 goto_tab 6
map kitty_mod+7 goto_tab 7
map kitty_mod+8 goto_tab 8
map kitty_mod+9 goto_tab 9

# ───────────────────────────────────────────────────────────────────────────
# Clipboard Operations
# ───────────────────────────────────────────────────────────────────────────
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard

# ───────────────────────────────────────────────────────────────────────────
# Windows (splits) — iTerm2-style
# ───────────────────────────────────────────────────────────────────────────
map kitty_mod+d           launch --location=vsplit --cwd=current
map kitty_mod+shift+d     launch --location=hsplit --cwd=current
map kitty_mod+w           close_window

# Pane navigation — iTerm2-style (cmd+opt+arrows)
map kitty_mod+left        neighboring_window left
map kitty_mod+right       neighboring_window right
map kitty_mod+up          neighboring_window up
map kitty_mod+down        neighboring_window down

# Cycle panes — iTerm2-style (cmd+[ / cmd+])
map kitty_mod+[           previous_window
map kitty_mod+]           next_window

# Switch OS window — iTerm2-style (cmd+`)
map kitty_mod+grave       next_os_window

# ───────────────────────────────────────────────────────────────────────────
# Resize
# ───────────────────────────────────────────────────────────────────────────
map kitty_mod+shift+left    resize_window narrower  5
map kitty_mod+shift+right   resize_window wider     5
map kitty_mod+shift+up      resize_window taller    5
map kitty_mod+shift+down    resize_window shorter   5

# ───────────────────────────────────────────────────────────────────────────
# Scrollback
# ───────────────────────────────────────────────────────────────────────────
map kitty_mod+u      scroll_page_up
map kitty_mod+home   scroll_home
map kitty_mod+end    scroll_end

# ───────────────────────────────────────────────────────────────────────────
# Font Size Adjustment
# ───────────────────────────────────────────────────────────────────────────
map kitty_mod+equal change_font_size all +1.0
map kitty_mod+minus change_font_size all -1.0
map kitty_mod+0     change_font_size all 0

# ───────────────────────────────────────────────────────────────────────────
# Kitty Configuration
# ───────────────────────────────────────────────────────────────────────────
map kitty_mod+f1       show_kitty_doc overview
map ctrl+kitty_mod+,   load_config_file

# ───────────────────────────────────────────────────────────────────────────
# Mouse Actions
# ───────────────────────────────────────────────────────────────────────────
mouse_map middle release ungrabbed paste_from_selection
