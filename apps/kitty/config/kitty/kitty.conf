# ── Font ──────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        18.0
disable_ligatures never

# ── Cursor ────────────────────────────────────────────────────────────────────
cursor_shape          block
cursor_blink_interval 0

# ── Scrollback ────────────────────────────────────────────────────────────────
scrollback_lines        10000
wheel_scroll_multiplier 5.0

# ── Window ────────────────────────────────────────────────────────────────────
window_padding_width      10
remember_window_size      yes
initial_window_width      100c
initial_window_height     30c
hide_window_decorations   no
draw_minimal_borders      yes

# ── Tab bar ───────────────────────────────────────────────────────────────────
tab_bar_style        powerline
tab_powerline_style  slanted
tab_bar_min_tabs     1
tab_title_template   " {title} "

# ── Shell integration ─────────────────────────────────────────────────────────
shell_integration enabled

# ── Performance ───────────────────────────────────────────────────────────────
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# ── URLs ──────────────────────────────────────────────────────────────────────
url_style           single
open_url_with       default
detect_urls         yes
copy_on_select      no

# ── macOS ─────────────────────────────────────────────────────────────────────
macos_option_as_alt              yes
macos_quit_when_last_window_closed yes
macos_traditional_fullscreen     no
macos_show_window_title_in       menubar

# ── Keybindings ───────────────────────────────────────────────────────────────
# Tabs
map cmd+t        new_tab_with_cwd
map cmd+w        close_tab
map cmd+]        next_tab
map cmd+[        previous_tab
map cmd+1        goto_tab 1
map cmd+2        goto_tab 2
map cmd+3        goto_tab 3
map cmd+4        goto_tab 4
map cmd+5        goto_tab 5

# Windows (splits)
map cmd+enter    launch --location=vsplit --cwd=current
map cmd+shift+enter launch --location=hsplit --cwd=current
map cmd+shift+]  next_window
map cmd+shift+[  previous_window

# Resize
map cmd+shift+h  resize_window narrower 5
map cmd+shift+l  resize_window wider 5
map cmd+shift+k  resize_window taller 5
map cmd+shift+j  resize_window shorter 5

# Scrollback
map cmd+k        scroll_line_up
map cmd+j        scroll_line_down
map cmd+u        scroll_page_up
map cmd+d        scroll_page_down
map cmd+home     scroll_home
map cmd+end      scroll_end

# Font size
map cmd+equal    change_font_size all +1.0
map cmd+minus    change_font_size all -1.0
map cmd+0        change_font_size all 0

# ── Color scheme — Catppuccin Mocha ───────────────────────────────────────────
