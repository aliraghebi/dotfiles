# ============================================================================
# KITTY TERMINAL CONFIGURATION
# ============================================================================
# Main configuration file for kitty terminal emulator
# This file includes modular configuration files for better organization
# Documentation: https://sw.kovidgoyal.net/kitty/conf.html

# ───────────────────────────────────────────────────────────────────────────
# Font Settings
# ───────────────────────────────────────────────────────────────────────────
include fonts.conf

# ───────────────────────────────────────────────────────────────────────────
# Scrollback
# ───────────────────────────────────────────────────────────────────────────
scrollback_lines 5000
scrollback_pager_history_size 4
scrollback_pager less -R -S --hilite-search --mouse --wheel-lines=3 --RAW-CONTROL-CHARS -M --tilde +INPUT_LINE_NUMBER

# ───────────────────────────────────────────────────────────────────────────
# Window Properties
# ───────────────────────────────────────────────────────────────────────────
remember_window_size yes
remember_window_position yes

# ───────────────────────────────────────────────────────────────────────────
# Terminal Bell Configuration
# ───────────────────────────────────────────────────────────────────────────
# Visual indicator shown on tab when a background window has a bell
# Uses Unicode emoji to indicate bell activity
bell_on_tab "🔔 "

# Disable audio bell for silent operation
# Set to 'yes' if you want audible notification
enable_audio_bell no

# Notify when a long-running command finishes while kitty is not focused
notify_on_cmd_finish invisible 10

# ───────────────────────────────────────────────────────────────────────────
# Tab Bar Settings
# ───────────────────────────────────────────────────────────────────────────
include tabs.conf

# ───────────────────────────────────────────────────────────────────────────
# Visual Enhancements
# ───────────────────────────────────────────────────────────────────────────
include visuals.conf

# ───────────────────────────────────────────────────────────────────────────
# Mouse Configuration
# ───────────────────────────────────────────────────────────────────────────
# Time (in seconds) to wait before hiding mouse cursor when typing
# Set to -1 to never hide the mouse cursor
mouse_hide_wait -1

# ───────────────────────────────────────────────────────────────────────────
# Remote Control
# ───────────────────────────────────────────────────────────────────────────
# Allow other programs to control kitty via its remote control protocol
# This enables powerful automation and scripting capabilities
# WARNING: Only enable if you understand the security implications
# Programs can: send text, open/close windows, read window content, etc.
# Works even over SSH connections
allow_remote_control yes

# Listen for remote control connections on localhost
# Port 0 = automatically select an available port
listen_on tcp:localhost:0

# ───────────────────────────────────────────────────────────────────────────
# Performance Settings
# ───────────────────────────────────────────────────────────────────────────
include performance.conf

# ───────────────────────────────────────────────────────────────────────────
# Keyboard Shortcuts
# ───────────────────────────────────────────────────────────────────────────
include keybindings.conf

# ───────────────────────────────────────────────────────────────────────────
# OS-Specific Settings
# ───────────────────────────────────────────────────────────────────────────
# Load OS-specific config using KITTY_OS (linux, macos, or bsd)
# Loaded after keybindings.conf so OS-specific overrides take precedence
include ${KITTY_OS}.conf

# ───────────────────────────────────────────────────────────────────────────
# Color Scheme
# ───────────────────────────────────────────────────────────────────────────
# Background opacity (0.0 = fully transparent, 1.0 = fully opaque)
# Requires compositor support (e.g., on X11) or native transparency (macOS)
background_opacity 1

# Theme: Corvine by arzg
# A carefully crafted color scheme with good contrast and readability
include theme.conf

# ───────────────────────────────────────────────────────────────────────────
# Hostname-Specific Configuration
# ───────────────────────────────────────────────────────────────────────────
# Create a file named <hostname>.conf to customize settings per machine
# Example: tantive-iv.conf for hostname "tantive-iv"
# This file is optional and silently ignored if not present
include ${HOSTNAME}.conf
