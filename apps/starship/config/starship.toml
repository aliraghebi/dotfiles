# Starship configuration
# Cross-platform: macOS & Linux
# https://starship.rs/config/

# --- Global ---
add_newline = true

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$java\
$docker_context\
$cmd_duration\
$line_break\
$character"""

# --- OS icon ---
[os]
disabled = false
format = "[$symbol]($style) "
style = "bold white"

[os.symbols]
Macos = ""
Linux = ""
Ubuntu = ""
Debian = ""
Fedora = ""
Arch = ""

# --- Username (show only when SSH or root) ---
[username]
show_always = false
format = "[$user]($style)@"
style_user = "bold cyan"
style_root = "bold red"

# --- Hostname (show only when SSH) ---
[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "bold green"

# --- Directory ---
[directory]
truncation_length = 4
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold blue"
read_only = " "
read_only_style = "red"

# --- Git ---
[git_branch]
format = "on [$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "bold purple"
truncation_length = 30

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "✖"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold yellow"

# --- Languages (only shown when in a project of that type) ---
[python]
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = " "
style = "bold yellow"
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version", "Pipfile"]

[nodejs]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold green"
detect_files = ["package.json", ".node-version", ".nvmrc"]

[rust]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold red"

[golang]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold cyan"

[java]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold red"

# --- Docker ---
[docker_context]
format = "via [$symbol$context]($style) "
symbol = " "
style = "bold blue"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

# --- Command duration (show if >2s) ---
[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "bold yellow"

# --- Prompt character ---
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"
